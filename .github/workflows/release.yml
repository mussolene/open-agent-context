name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
      || github.event_name == 'push' && (
        contains(github.ref_name, 'a') ||
        contains(github.ref_name, 'b') ||
        contains(github.ref_name, 'rc')
      )
    environment:
      name: testpypi
      url: https://test.pypi.org/project/oacs/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build and check distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'
      || github.event_name == 'push' && !(
        contains(github.ref_name, 'a') ||
        contains(github.ref_name, 'b') ||
        contains(github.ref_name, 'rc')
      )
    environment:
      name: pypi
      url: https://pypi.org/project/oacs/
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build and check distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "OACS ${VERSION}" --latest
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "OACS ${VERSION}" \
              --generate-notes \
              --latest
          fi
